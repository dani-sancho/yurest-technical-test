services:
  frontend:
    build: .
    ports:
      - "4200:80"
    depends_on:
      - api

  api:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - .:/app
    command: sh -c "npm install && npx json-server --watch mock-data.json --host 0.0.0.0 --port 3000"
    ports:
      - "3000:3000"