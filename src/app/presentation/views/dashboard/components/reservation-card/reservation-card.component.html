<div class="rounded-2xl border border-slate-100 bg-white p-5 space-y-4 transition-all hover:border-slate-200">
  <div class="flex items-center justify-between">
    <span class="font-mono text-xs font-semibold text-slate-400">#{{ reservation().id }}</span>
    <app-status-badge [status]="reservation().estado" />
  </div>

  <div>
    <h4 class="font-bold text-slate-900">{{ reservation().cliente }}</h4>
    @if (reservation().notas) {
      <div class="mt-2 rounded-xl bg-slate-50 border border-slate-100/50 p-2.5">
        <p class="text-xs text-slate-500"><span class="font-semibold text-slate-600">Nota:</span> {{ reservation().notas }}</p>
      </div>
    }
  </div>

  <div class="grid grid-cols-2 gap-y-3 gap-x-2 text-xs pt-1">
    <div class="flex flex-col"><span class="text-slate-400 font-medium">Mesa</span><span class="text-slate-900 font-semibold mt-0.5">{{ tableName() }}</span></div>
    <div class="flex flex-col"><span class="text-slate-400 font-medium">Comensales</span><span class="text-slate-900 font-semibold mt-0.5">{{ reservation().comensales }}</span></div>
    <div class="flex flex-col"><span class="text-slate-400 font-medium">Fecha</span><span class="text-slate-900 font-semibold mt-0.5">{{ fmtDate(reservation().fecha) }}</span></div>
    <div class="flex flex-col"><span class="text-slate-400 font-medium">Hora</span><span class="text-slate-900 font-semibold mt-0.5">{{ reservation().hora }}</span></div>
  </div>

  <div class="flex gap-2.5 pt-3 border-t border-slate-50">
    <app-button variant="success" size="sm" class="flex-1" [disabled]="!canConfirm(reservation().estado)" [loading]="loading()" loadingLabel="Confirmando..." (handler)="confirm.emit(reservation().id)">
      <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" /></svg>
      Confirmar
    </app-button>
    <app-button variant="danger" size="sm" class="flex-1" [disabled]="!canCancel(reservation().estado)" [loading]="loading()" loadingLabel="Cancelando..." (handler)="cancel.emit(reservation().id)">
      <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
      Cancelar
    </app-button>
  </div>
</div>
