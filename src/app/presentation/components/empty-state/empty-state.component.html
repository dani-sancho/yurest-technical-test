<div class="flex flex-col items-center justify-center rounded-2xl border border-dashed border-slate-200 bg-white p-12 text-center">
  <div class="mb-4 flex h-14 w-14 items-center justify-center rounded-full bg-slate-50 text-slate-400 ring-8 ring-slate-50/50">
    <svg class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.604 10.604z" />
    </svg>
  </div>
  <h3 class="text-lg font-semibold tracking-tight text-slate-900">{{ title() }}</h3>
  <p class="mt-1.5 max-w-sm text-sm leading-relaxed text-slate-500">{{ description() }}</p>
  <button type="button" (click)="clearFilters.emit()" class="mt-6 inline-flex items-center rounded-xl bg-slate-900 px-4 py-2.5 text-sm font-semibold text-white transition-all hover:bg-slate-800 active:scale-[0.98] focus:outline-none focus:ring-2 focus:ring-slate-900 focus:ring-offset-2">
    Limpiar filtros
  </button>
</div>
