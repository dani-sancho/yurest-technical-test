@if (type() === 'table') {
  <div class="hidden md:block rounded-2xl border border-slate-100 bg-white p-6">
    <div class="space-y-4">
      @for (row of placeholders(); track row) {
        <div class="flex items-center gap-4">
          <div class="h-4 w-12 animate-pulse rounded bg-slate-100"></div>
          <div class="h-4 w-36 animate-pulse rounded bg-slate-100"></div>
          <div class="h-4 w-24 animate-pulse rounded bg-slate-100"></div>
          <div class="h-4 w-20 animate-pulse rounded bg-slate-100"></div>
          <div class="h-4 w-16 animate-pulse rounded bg-slate-100"></div>
          <div class="h-6 w-20 animate-pulse rounded-full bg-slate-100"></div>
          <div class="ml-auto flex gap-2">
            <div class="h-8 w-20 animate-pulse rounded-lg bg-slate-100"></div>
            <div class="h-8 w-20 animate-pulse rounded-lg bg-slate-100"></div>
          </div>
        </div>
      }
    </div>
  </div>
} @else {
  <div class="grid grid-cols-1 gap-4 md:hidden">
    @for (card of placeholders(); track card) {
      <div class="rounded-2xl border border-slate-100 bg-white p-5 space-y-4">
        <div class="flex justify-between">
          <div class="h-4 w-10 animate-pulse rounded bg-slate-100"></div>
          <div class="h-6 w-20 animate-pulse rounded-full bg-slate-100"></div>
        </div>
        <div class="space-y-2">
          <div class="h-5 w-40 animate-pulse rounded bg-slate-100"></div>
          <div class="h-4 w-56 animate-pulse rounded bg-slate-100"></div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          @for (f of [1,2,3,4]; track f) {
            <div class="space-y-1.5">
              <div class="h-3 w-12 animate-pulse rounded bg-slate-100"></div>
              <div class="h-4 w-20 animate-pulse rounded bg-slate-100"></div>
            </div>
          }
        </div>
        <div class="flex gap-2.5 pt-3 border-t border-slate-50">
          <div class="flex-1 h-10 animate-pulse rounded-xl bg-slate-100"></div>
          <div class="flex-1 h-10 animate-pulse rounded-xl bg-slate-100"></div>
        </div>
      </div>
    }
  </div>
}
