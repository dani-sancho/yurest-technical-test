@if (total() > 0) {
  <div class="flex flex-col gap-3 rounded-2xl border border-slate-100 bg-white px-5 py-4 sm:flex-row sm:items-center sm:justify-between">
    <p class="text-sm text-slate-500">
      Mostrando <span class="font-semibold text-slate-700">{{ from() }}–{{ to() }}</span> de
      <span class="font-semibold text-slate-700">{{ total() }}</span> resultados
    </p>

    <nav class="flex items-center gap-1">
      <button type="button" (click)="goTo(page() - 1)" [disabled]="page() <= 1"
        class="inline-flex h-9 w-9 items-center justify-center rounded-lg text-sm font-medium text-slate-500 transition-colors hover:bg-slate-100 hover:text-slate-900 disabled:opacity-30 disabled:cursor-not-allowed">
        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" /></svg>
      </button>

      @for (p of pages(); track $index) {
        @if (p === '...') {
          <span class="inline-flex h-9 w-9 items-center justify-center text-sm text-slate-400">...</span>
        } @else {
          <button type="button" (click)="goTo(p)"
            class="inline-flex h-9 w-9 items-center justify-center rounded-lg text-sm font-medium transition-colors"
            [class]="p === page()
              ? 'bg-slate-900 text-white shadow-sm'
              : 'text-slate-600 hover:bg-slate-100 hover:text-slate-900'">
            {{ p }}
          </button>
        }
      }

      <button type="button" (click)="goTo(page() + 1)" [disabled]="page() >= totalPages()"
        class="inline-flex h-9 w-9 items-center justify-center rounded-lg text-sm font-medium text-slate-500 transition-colors hover:bg-slate-100 hover:text-slate-900 disabled:opacity-30 disabled:cursor-not-allowed">
        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" /></svg>
      </button>
    </nav>
  </div>
}
